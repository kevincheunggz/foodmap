 <!DOCTYPE html>
  <html lang="zh-CN">
  <head>
      <meta charset="UTF-8">
      <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
      <meta name="theme-color" content="#FF6B35">
      <meta name="apple-mobile-web-app-capable" content="yes">
      <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
      <title>美食地图 - 毛毛美食指南</title>
      <link rel="manifest" href="manifest.json">
      <link rel="apple-touch-icon" href="icons/icon-192x192.png">
      <link rel="stylesheet" href="css/style.css">
      <!-- 高德地图 -->
      <script src="https://webapi.amap.com/maps?v=2.0&key=52d44844a3d67363c77baf0d3269764e"></script>
  </head>
  <body>
      <!-- 加载动画 -->
      <div id="loading" class="loading">
          <div class="loading-spinner"></div>
          <p>正在加载美食地图...</p>
      </div>

      <!-- 主容器 -->
      <div id="app" class="app hidden">
          <!-- 顶部导航 -->
          <header class="header">
              <h1>🍜 美食地图</h1>
              <div class="header-actions">
                  <button id="syncBtn" class="icon-btn" title="同步最新数据">
                      <span>🔄</span>
                  </button>
                  <button id="addBtn" class="icon-btn" title="添加店铺">
                      <span>➕</span>
                  </button>
              </div>
          </header>

          <!-- 统计栏 -->
          <div class="stats-bar">
              <div class="stat-item">
                  <span class="stat-value" id="totalCount">0</span>
                  <span class="stat-label">收藏店铺</span>
              </div>
              <div class="stat-item">
                  <span class="stat-value" id="visitedCount">0</span>
                  <span class="stat-label">已打卡</span>
              </div>
              <div class="stat-item">
                  <span class="stat-value" id="pendingCount">0</span>
                  <span class="stat-label">待打卡</span>
              </div>
          </div>

          <!-- 搜索和筛选 -->
          <div class="filter-bar">
              <div class="search-box">
                  <input type="text" id="searchInput" placeholder="搜索店铺名称、地址...">
                  <button id="clearSearch">✕</button>
              </div>
              <select id="cuisineFilter">
                  <option value="">全部菜系</option>
                  <option value="川菜">🌶️ 川菜</option>
                  <option value="粤菜">🥟 粤菜</option>
                  <option value="火锅">🍲 火锅</option>
                  <option value="烧烤">🍖 烧烤</option>
                  <option value="海鲜">🦐 海鲜</option>
                  <option value="日料">🍣 日料</option>
                  <option value="韩料">🍱 韩料</option>
                  <option value="西餐">🍝 西餐</option>
                  <option value="小吃">🥟 小吃</option>
                  <option value="甜品">🍰 甜品</option>
                  <option value="其他">🍽️ 其他</option>
              </select>
          </div>

          <!-- 标签切换 -->
          <div class="tab-bar">
              <button class="tab-btn active" data-tab="map">🗺️ 地图</button>
              <button class="tab-btn" data-tab="list">📋 列表</button>
          </div>

          <!-- 地图视图 -->
          <div id="mapView" class="tab-content active">
              <div id="mapContainer"></div>
              <div id="mapInfoCard" class="map-info-card hidden">
                  <div class="card-header">
                      <h3 id="cardTitle">店铺名称</h3>
                      <button id="closeCard" class="close-btn">✕</button>
                  </div>
                  <p id="cardAddress" class="card-address">地址</p>
                  <div class="card-tags">
                      <span id="cardCuisine" class="tag"></span>
                      <span id="cardPrice" class="tag"></span>
                  </div>
                  <div class="card-actions">
                      <button id="cardDetail" class="btn-secondary">查看详情</button>
                      <button id="cardNavigate" class="btn-primary">🧭 导航到店</button>
                  </div>
              </div>
          </div>

          <!-- 列表视图 -->
          <div id="listView" class="tab-content">
              <div id="restaurantList" class="restaurant-list"></div>
              <div id="emptyState" class="empty-state hidden">
                  <div class="empty-icon">🍽️</div>
                  <p>还没有收藏任何店铺</p>
                  <p class="empty-sub">点击右上角 + 号开始记录美食吧</p>
              </div>
          </div>
      </div>

      <!-- 添加/编辑店铺弹窗 -->
      <div id="modal" class="modal hidden">
          <div class="modal-content">
              <div class="modal-header">
                  <h2 id="modalTitle">添加店铺</h2>
                  <button id="closeModal" class="close-btn">✕</button>
              </div>
              <form id="restaurantForm">
                  <input type="hidden" id="restaurantId">

                  <div class="form-group">
                      <label>店铺名称 *</label>
                      <input type="text" id="formName" required placeholder="例如：老成都火锅">
                  </div>

                  <div class="form-group">
                      <label>详细地址 *</label>
                      <input type="text" id="formAddress" required placeholder="完整地址">
                  </div>

                  <div class="form-row">
                      <div class="form-group">
                          <label>纬度 *</label>
                          <input type="number" id="formLat" step="any" required placeholder="39.9042">
                      </div>
                      <div class="form-group">
                          <label>经度 *</label>
                          <input type="number" id="formLng" step="any" required placeholder="116.4074">
                      </div>
                  </div>

                  <div class="form-row">
                      <div class="form-group">
                          <label>菜系类型</label>
                          <select id="formCuisine">
                              <option value="">请选择</option>
                              <option value="川菜">🌶️ 川菜</option>
                              <option value="粤菜">🥟 粤菜</option>
                              <option value="火锅">🍲 火锅</option>
                              <option value="烧烤">🍖 烧烤</option>
                              <option value="海鲜">🦐 海鲜</option>
                              <option value="日料">🍣 日料</option>
                              <option value="韩料">🍱 韩料</option>
                              <option value="西餐">🍝 西餐</option>
                              <option value="小吃">🥟 小吃</option>
                              <option value="甜品">🍰 甜品</option>
                              <option value="其他">🍽️ 其他</option>
                          </select>
                      </div>
                      <div class="form-group">
                          <label>人均消费（元）</label>
                          <input type="number" id="formPrice" placeholder="80">
                      </div>
                  </div>

                  <div class="form-group">
                      <label>联系电话</label>
                      <input type="tel" id="formPhone" placeholder="021-12345678">
                  </div>

                  <div class="form-group">
                      <label>B站视频标题</label>
                      <input type="text" id="formVideoTitle" placeholder="视频标题">
                  </div>

                  <div class="form-group">
                      <label>B站视频链接</label>
                      <input type="url" id="formVideoUrl" placeholder="https://www.bilibili.com/video/...">
                  </div>

                  <div class="form-group">
                      <label>评分</label>
                      <div class="rating-input">
                          <span class="star" data-value="1">⭐</span>
                          <span class="star" data-value="2">⭐</span>
                          <span class="star" data-value="3">⭐</span>
                          <span class="star" data-value="4">⭐</span>
                          <span class="star" data-value="5">⭐</span>
                          <input type="hidden" id="formRating" value="0">
                      </div>
                  </div>

                  <div class="form-group">
                      <label>营业时间</label>
                      <input type="text" id="formHours" placeholder="10:00-22:00">
                  </div>

                  <div class="form-group">
                      <label>个人备注</label>
                      <textarea id="formNotes" rows="3" placeholder="记录你的想法..."></textarea>
                  </div>

                  <div class="form-group checkbox-group">
                      <label>
                          <input type="checkbox" id="formVisited">
                          <span>我已经去过这家店了</span>
                      </label>
                  </div>

                  <div class="form-actions">
                      <button type="button" id="deleteBtn" class="btn-danger hidden">删除</button>
                      <button type="submit" class="btn-primary">保存</button>
                  </div>
              </form>
          </div>
      </div>

      <!-- 详情弹窗 -->
      <div id="detailModal" class="modal hidden">
          <div class="modal-content detail-content">
              <div class="modal-header">
                  <h2 id="detailTitle">店铺详情</h2>
                  <button id="closeDetail" class="close-btn">✕</button>
              </div>
              <div id="detailContent" class="detail-body"></div>
              <div class="detail-actions">
                  <button id="detailEdit" class="btn-secondary">编辑</button>
                  <button id="detailNavigate" class="btn-primary">🧭 导航到店</button>
              </div>
          </div>
      </div>

      <!-- 同步弹窗 -->
      <div id="syncModal" class="modal hidden">
          <div class="modal-content sync-content">
              <div class="sync-animation">🔄</div>
              <h3>正在同步数据...</h3>
              <p id="syncStatus">检查更新中</p>
              <div class="sync-result hidden" id="syncResult"></div>
              <button id="closeSync" class="btn-primary">确定</button>
          </div>
      </div>

      <!-- Toast提示 -->
      <div id="toast" class="toast hidden">
          <span id="toastMessage"></span>
      </div>

      <script src="js/app.js"></script>
  </body>
  </html>
