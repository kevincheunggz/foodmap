<!DOCTYPE html>
  <html>
  <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>美食地图</title>
  <script src="https://webapi.amap.com/maps?v=2.0&key=52d44844a3d67363c77baf0d3269764e"></script>
  <style>
  body{font-family:system-ui;margin:0;background:#f5f5f5}
  .header{background:#ff6b35;color:#fff;padding:15px;text-align:center}
  .btn{background:#ff6b35;color:#fff;border:none;padding:10px 20px;border-radius:5px;margin:5px}
  .item{background:#fff;margin:10px;padding:15px;border-radius:10px;box-shadow:0 2px 5px rgba(0,0,0,0.1)}
  #map{height:400px;width:100%}
  .hidden{display:none}
  .modal{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify
  -content:center}
  .modal.show{display:flex}
  .modal-content{background:#fff;padding:20px;border-radius:10px;width:90%;max-width:400px}
  input,select{width:100%;padding:10px;margin:5px 0;border:1px solid #ddd;border-radius:5px}
  </style>
  </head>
  <body>
  <div class="header">
    <h2>🍜 美食地图</h2>
    <button class="btn" onclick="showAdd()">添加店铺</button>
  </div>
  <div id="stats" style="text-align:center;padding:10px"></div>
  <div id="map"></div>
  <div id="list"></div>

  <div id="modal" class="modal">
    <div class="modal-content">
      <h3>添加店铺</h3>
      <input id="name" placeholder="店铺名称">
      <input id="addr" placeholder="地址">
      <input id="lat" type="number" step="any" placeholder="纬度">
      <input id="lng" type="number" step="any" placeholder="经度">
      <select id="type">
        <option value="">选择类型</option>
        <option>火锅</option>
        <option>川菜</option>
        <option>粤菜</option>
        <option>日料</option>
      </select>
      <button class="btn" onclick="save()">保存</button>
      <button class="btn" onclick="closeModal()" style="background:#999">取消</button>
    </div>
  </div>

  <script>
  var data = JSON.parse(localStorage.getItem('fm') ||
  '[{"id":1,"name":"示例-成都火锅","addr":"成都市锦江区","lat":30.65,"lng":104.06,"type":"火锅","visit":0}]');
  var map;

  function init() {
    showStats();
    showList();
    if(typeof AMap!='undefined'){
      map = new AMap.Map('map',{zoom:12,center:[104.06,30.65]});
      showMarkers();
    }
  }

  function showStats() {
    var v = data.filter(function(x){return x.visit}).length;
    document.getElementById('stats').innerHTML = '共'+data.length+'家 | 已打卡'+v+'家';
  }

  function showList() {
    var h = '';
    data.forEach(function(x){
      h += '<div class="item" onclick="toggle('+x.id+')">';
      h += '<b>'+x.name+'</b> ';
      h += x.visit ? '✅' : '⭕';
      h += '<br><small>'+x.addr+'</small>';
      h += '</div>';
    });
    document.getElementById('list').innerHTML = h;
  }

  function showMarkers() {
    data.forEach(function(x){
      var m = new AMap.Marker({position:[x.lng,x.lat],title:x.name});
      m.setMap(map);
    });
  }

  function showAdd() {
    document.getElementById('modal').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('show');
  }

  function save() {
    var o = {
      id: Date.now(),
      name: document.getElementById('name').value,
      addr: document.getElementById('addr').value,
      lat: parseFloat(document.getElementById('lat').value),
      lng: parseFloat(document.getElementById('lng').value),
      type: document.getElementById('type').value,
      visit: 0
    };
    data.push(o);
    localStorage.setItem('fm', JSON.stringify(data));
    closeModal();
    init();
    alert('添加成功');
  }

  function toggle(id) {
    var x = data.find(function(y){return y.id==id});
    x.visit = !x.visit;
    localStorage.setItem('fm', JSON.stringify(data));
    init();
  }

  init();
  </script>
  </body>
  </html>
